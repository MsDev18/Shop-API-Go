services:
  mysql-container:
    container_name: mysql-container
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - 3308:3306
    environment:
      MYSQL_ROOT_PASSWORD: root-pass
      MYSQL_DATABASE: shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shop-pass
    volumes:
      - mysql-data:/mysql-data:/var/lib/mysql
    networks:
      - shop-network

  phpmyadmin-container:
    container_name: phpmyadmin-container
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      PMA_HOST: mysql-container
      PMA_PORT: 3306
    networks:
      - shop-network

volumes:
  mysql-data:

networks:
  shop-network:
    driver: bridge